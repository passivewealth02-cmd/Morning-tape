name: Deploy to Vercel (Production)

# Deploys main to the existing Vercel project on every push.
# Replaces the broken Vercel Git webhook — GitHub Actions runs on
# GitHub's infrastructure and can reach Vercel directly.
#
# We let Vercel build on its own infrastructure (no --prebuilt) so the
# project's configured environment variables (DATABASE_URL, etc.) are
# available at build time — exactly like the native Git integration.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  VERCEL_ORG_ID: team_6yLLdvZCvzfedL1Sv4pAIIe2
  VERCEL_PROJECT_ID: prj_kJYr8kGa6Ef5IoPP1lzVwj2kwooh

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to production (Vercel builds remotely)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
